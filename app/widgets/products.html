<html lang="ru">

            </a>
            <label class="search-input-wrap">
              <input id="products-search-input" type="text" placeholder="Искать по всем категориям" />
              <button id="products-search-button" class="search-icon" aria-label="Поиск">
                <svg class="products-icon products-icon--search" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"></circle>
                  <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                </svg>
              </button>
            </label>
            <button
              class="support-button"
              id="products-support-button"
              type="button"
              aria-label="Поддержка"
              aria-controls="products-support-popup"
              aria-expanded="false"
            >
              <svg class="products-icon products-icon--headset" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 13a8 8 0 0 1 16 0"></path>
                <rect x="3.5" y="12" width="4" height="6" rx="1.5"></rect>
                <rect x="16.5" y="12" width="4" height="6" rx="1.5"></rect>
                <path d="M20.5 18.5a3.5 3.5 0 0 1-3.5 3.5H13"></path>
              </svg>
            </button>
          </section>

          <div class="carousel-frame">
            <div class="carousel-arrow-wrap left">
              <button class="carousel-arrow left" id="products-arrow-left" aria-label="Предыдущий">
                <svg class="products-icon products-icon--chevron" viewBox="0 0 24 24" aria-hidden="true">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
            </div>
            <div class="product-carousel">
              <div class="carousel-viewport">
                <section class="product-track" id="product-track" aria-live="polite"></section>
              </div>
            </div>
            <div class="carousel-arrow-wrap right">
              <button class="carousel-arrow right" id="products-arrow-right" aria-label="Следующий">
                <svg class="products-icon products-icon--chevron" viewBox="0 0 24 24" aria-hidden="true">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>
          </div>

          <div class="products-support-layer" id="products-support-layer" hidden>
            <section
              class="products-support-popup"
              id="products-support-popup"
              role="dialog"
              aria-modal="true"
              aria-labelledby="products-support-title"
            >
              <header class="products-support-header">
                <h2 class="products-support-title" id="products-support-title">Уточнить наличие</h2>
                <button class="products-support-close" id="products-support-close" type="button" aria-label="Закрыть">
                  ×
                </button>
              </header>

              <a
                class="products-support-item"
                id="products-support-facebook"
                href="https://www.facebook.com/kokiko.md/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Открыть Facebook"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="#1877f2" d="M13.6 22v-8.1h2.7l.5-3.2h-3.2V8.6c0-.9.3-1.6 1.6-1.6h1.8V4.1c-.3 0-1.4-.1-2.6-.1-2.6 0-4.3 1.6-4.3 4.5v2.3H8v3.2h2.1V22h3.5z"></path>
                </svg>
                <span>Facebook</span>
              </a>

              <a
                class="products-support-item"
                id="products-support-instagram"
                href="https://www.instagram.com/kokiko.md"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Открыть Instagram"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="5" ry="5" fill="none" stroke="#e1306c" stroke-width="2"></rect>
                  <circle cx="12" cy="12" r="4" fill="none" stroke="#e1306c" stroke-width="2"></circle>
                  <circle cx="17.2" cy="6.8" r="1.2" fill="#e1306c"></circle>
                </svg>
                <span>Instagram</span>
              </a>

              <a
                class="products-support-item"
                id="products-support-email"
                href="mailto:kokikomoldova@gmail.com"
                aria-label="Написать на почту kokikomoldova@gmail.com"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="14" rx="2" ry="2" fill="none" stroke="#6b7280" stroke-width="2"></rect>
                  <path d="M4 7l8 6 8-6" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span>kokikomoldova@gmail.com</span>
              </a>

              <a
                class="products-support-item"
                id="products-support-phone"
                href="tel:+37379802000"
                aria-label="Позвонить 079 802 000"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="#6b7280" d="M7.5 2.5l3 4.6-1.7 2.1a13 13 0 0 0 6 6l2.1-1.7 4.6 3v1.9c0 1-1 1.8-2.1 1.6A18.6 18.6 0 0 1 4 4.6C3.8 3.5 4.6 2.5 5.6 2.5h1.9z"></path>
                </svg>
                <span>079 802 000</span>
              </a>
            </section>
          </div>
        </section>
      </div>
    </main>
    <script src="./scripts/state.js"></script>
    <script src="./scripts/products-render.js"></script>
    <script src="./scripts/products-tools.js"></script>
    <script src="./scripts/products-support.js"></script>
    <script src="./scripts/products-theme.js"></script>
    <script src="./scripts/products.js"></script>
  </body>
</html>
